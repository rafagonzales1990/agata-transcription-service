<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ágata Transcription</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 300px; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; color: #111827; }
    .header { padding: 16px; background: linear-gradient(135deg, #10B981, #0D9488); color: white; text-align: center; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }
    .content { padding: 16px; }
    .status { display: flex; align-items: center; gap: 8px; padding: 12px; border-radius: 8px; background: #F0FDF4; border: 1px solid #BBF7D0; margin-bottom: 12px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10B981; }
    .status-text { font-size: 12px; color: #166534; }
    .info { font-size: 11px; color: #6B7280; line-height: 1.5; }
    .info a { color: #10B981; text-decoration: none; }
    .info a:hover { text-decoration: underline; }
    .footer { padding: 12px 16px; border-top: 1px solid #F3F4F6; text-align: center; }
    .footer a { font-size: 11px; color: #10B981; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Ágata Transcription</h1>
    <p>Extensão de Gravação v1.1.0</p>
  </div>
  <div class="content">
    <div class="status">
      <div class="status-dot"></div>
      <div class="status-text">Extensão ativa</div>
    </div>
    <p class="info">
      Abra uma reunião no <strong>Google Meet</strong>, <strong>Zoom</strong> ou <strong>Microsoft Teams</strong> para ver o botão de gravação.
    </p>
  </div>
  <div class="footer">
    <a href="https://agatatranscription.lovable.app/dashboard" target="_blank">Abrir Ágata Dashboard →</a>
  </div>
</body>
</html>
